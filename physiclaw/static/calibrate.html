<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PhysiClaw Calibration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#fff;
  overflow:hidden;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:none;
}
body{position:relative}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#phase-label{
  position:fixed;
  top:env(safe-area-inset-top,4px);
  right:4px;
  font:10px monospace;color:#ccc;z-index:1;
}
</style>
</head>
<body>
<div id="phase-label">idle</div>
<svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>

<script>
(function(){
  var svg = document.getElementById('canvas');
  var label = document.getElementById('phase-label');
  var W = window.innerWidth;
  var H = window.innerHeight;
  var currentPhase = 'idle';
  var currentVersion = 0;
  var phaseData = {};

  function updateSize(){
    W = window.innerWidth;
    H = window.innerHeight;
    svg.setAttribute('viewBox', '0 0 '+W+' '+H);
  }
  updateSize();
  window.addEventListener('resize', function(){ updateSize(); renderPhase(); });

  // ── SVG helpers ─────────────────────────────────────────
  function clear(){ svg.innerHTML = ''; }

  function circle(cx, cy, r, fill){
    var el = document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx', cx); el.setAttribute('cy', cy);
    el.setAttribute('r', r); el.setAttribute('fill', fill);
    svg.appendChild(el);
  }

  function rect(x, y, w, h, fill, rx){
    var el = document.createElementNS('http://www.w3.org/2000/svg','rect');
    el.setAttribute('x', x); el.setAttribute('y', y);
    el.setAttribute('width', w); el.setAttribute('height', h);
    el.setAttribute('fill', fill);
    if(rx) el.setAttribute('rx', rx);
    svg.appendChild(el);
  }

  function text(x, y, str, size, fill){
    var el = document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x', x); el.setAttribute('y', y);
    el.setAttribute('font-size', size); el.setAttribute('fill', fill);
    el.setAttribute('text-anchor', 'middle');
    el.setAttribute('dominant-baseline', 'middle');
    el.setAttribute('font-family', 'system-ui, sans-serif');
    el.setAttribute('font-weight', 'bold');
    el.textContent = str;
    svg.appendChild(el);
  }

  // ── Phase renderers ─────────────────────────────────────
  function renderPhase(){
    clear();
    var r = Math.min(W, H) * 0.08;

    switch(currentPhase){
      case 'idle':
        text(W/2, H/2, 'PhysiClaw', 24, '#ddd');
        text(W/2, H/2+30, 'Waiting for calibration...', 14, '#ccc');
        break;

      case 'center':
        // Large orange circle at exact center (Steps 0, 1, 4)
        circle(W*0.5, H*0.5, r, '#f97316');
        break;

      case 'markers':
        // Blue UP/RIGHT markers for camera rotation detection (Steps 2-3)
        var mSize = Math.min(W, H) * 0.12;
        rect(W*0.5-mSize*1.2, H*0.12-mSize*0.6, mSize*2.4, mSize*1.2, '#2563eb', 8);
        text(W*0.5, H*0.12, 'UP', mSize, '#ffffff');
        rect(W*0.82-mSize*1.8, H*0.5-mSize*0.6, mSize*3.6, mSize*1.2, '#2563eb', 8);
        text(W*0.82, H*0.5, 'RIGHT', mSize*0.8, '#ffffff');
        break;

      case 'grid':
        // 15 red dots at known screen positions (Step 5)
        var cols = phaseData.grid_cols || [0.25, 0.50, 0.75];
        var rows = phaseData.grid_rows || [0.20, 0.40, 0.50, 0.60, 0.80];
        var dotR = Math.min(W, H) * 0.015;
        for(var ri=0; ri<rows.length; ri++)
          for(var ci=0; ci<cols.length; ci++)
            circle(W*cols[ci], H*rows[ri], dotR, '#ef4444');
        break;

      case 'dot':
        // Single orange dot at server-specified position (Step 6 validation)
        var dx = (phaseData.dot_x || 0.5) * W;
        var dy = (phaseData.dot_y || 0.5) * H;
        circle(dx, dy, r*0.6, '#f97316');
        break;
    }
    label.textContent = currentPhase;
  }

  // ── Touch reporting ─────────────────────────────────────
  // Every touch is reported to the server with coordinates.
  // No green flash — calibration uses touch coordinates directly.
  var touchStartTime = 0;
  var touchStartX = 0;
  var touchStartY = 0;

  document.body.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.touches[0];
    touchStartTime = Date.now();
    touchStartX = t.pageX;
    touchStartY = t.pageY;
  }, {passive:false});

  document.body.addEventListener('touchend', function(e){
    e.preventDefault();
    var t = e.changedTouches[0];
    var endX = t.pageX;
    var endY = t.pageY;
    var duration = Date.now() - touchStartTime;
    var dx = endX - touchStartX;
    var dy = endY - touchStartY;
    var dist = Math.sqrt(dx*dx + dy*dy);

    var type, direction = null;
    if(dist > 30){
      type = 'swipe';
      direction = Math.abs(dx) > Math.abs(dy)
        ? (dx > 0 ? 'right' : 'left')
        : (dy > 0 ? 'bottom' : 'top');
    } else if(duration > 500){
      type = 'long-press';
    } else {
      type = 'tap';
    }

    // Report to server
    var payload = {
      x: Math.round(endX),
      y: Math.round(endY),
      type: type,
      phase: currentPhase,
      duration: duration,
      viewport_w: W,
      viewport_h: H,
      pixel_ratio: window.devicePixelRatio || 1,
      timestamp: Date.now()
    };
    if(direction) payload.direction = direction;

    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/calibrate/touch', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(payload));
  }, {passive:false});

  // Desktop click fallback
  document.body.addEventListener('click', function(e){
    var payload = {
      x: Math.round(e.pageX), y: Math.round(e.pageY),
      type: 'tap', phase: currentPhase, duration: 0,
      viewport_w: W, viewport_h: H,
      pixel_ratio: window.devicePixelRatio || 1,
      timestamp: Date.now()
    };
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/calibrate/touch', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(payload));
  });

  // ── Poll for phase changes ──────────────────────────────
  function poll(){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/calibrate/phase', true);
    xhr.timeout = 3000;
    xhr.onload = function(){
      if(xhr.status === 200){
        var data = JSON.parse(xhr.responseText);
        if(data.version !== currentVersion){
          currentVersion = data.version;
          currentPhase = data.phase;
          phaseData = data;
          renderPhase();
        }
      }
    };
    xhr.send();
  }
  setInterval(poll, 200);
  poll();

  // ── Device info on load ─────────────────────────────────
  (function(){
    var safeTop = parseInt(getComputedStyle(document.documentElement)
      .getPropertyValue('env(safe-area-inset-top)')) || 0;
    var safeBottom = parseInt(getComputedStyle(document.documentElement)
      .getPropertyValue('env(safe-area-inset-bottom)')) || 0;
    var info = {
      screen_width: Math.round(screen.width * devicePixelRatio),
      screen_height: Math.round(screen.height * devicePixelRatio),
      css_width: screen.width,
      css_height: screen.height,
      pixel_ratio: devicePixelRatio,
      viewport_width: window.innerWidth,
      viewport_height: window.innerHeight,
      safe_area_top: safeTop,
      safe_area_bottom: safeBottom,
      user_agent: navigator.userAgent
    };
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/device-info', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(info));
  })();

  renderPhase();
})();
</script>
</body>
</html>
