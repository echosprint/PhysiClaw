<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PhysiClaw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  background:#000;color:#fff;
  font-family:-apple-system,system-ui,"Helvetica Neue",sans-serif;
  overflow:hidden;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
  touch-action:manipulation;
}
body{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
}
#text{
  font-size:min(14vw,100px);
  font-weight:600;
  text-align:center;
  word-break:break-all;
  line-height:1.4;
  padding:20px;
  max-width:100%;
  transition:opacity 0.15s;
}
#text.waiting{opacity:0.15;font-size:min(6vw,40px);font-weight:400}
#status{
  position:fixed;
  top:calc(env(safe-area-inset-top,10px) + 6px);
  right:10px;
  font-size:11px;opacity:0.4;
  padding:4px 8px;
}
#feedback{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(34,197,94,0.15);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
}
#feedback.show{opacity:1}
#hint{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,20px) + 16px);
  font-size:13px;opacity:0.25;
  letter-spacing:0.5px;
}
</style>
</head>
<body>
<div id="status">●</div>
<div id="feedback"></div>
<div id="text" class="waiting">PhysiClaw Bridge</div>
<div id="hint">tap anywhere to copy</div>

<script>
(function(){
  var textEl = document.getElementById('text');
  var statusEl = document.getElementById('status');
  var feedbackEl = document.getElementById('feedback');
  var hintEl = document.getElementById('hint');
  var currentVersion = 0;
  var currentText = null;
  var pollErrors = 0;

  // ── Poll for new text ────────────────────────────────────
  function poll(){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/bridge/text', true);
    xhr.timeout = 3000;
    xhr.onload = function(){
      if(xhr.status === 200){
        pollErrors = 0;
        statusEl.textContent = '●';
        statusEl.style.color = '#4ade80';
        var data = JSON.parse(xhr.responseText);
        if(data.version > currentVersion && data.text !== null){
          currentVersion = data.version;
          currentText = data.text;
          textEl.textContent = currentText;
          textEl.className = '';
          hintEl.style.opacity = '0.4';
        }
      } else {
        onPollError();
      }
    };
    xhr.onerror = onPollError;
    xhr.ontimeout = onPollError;
    xhr.send();
  }

  function onPollError(){
    pollErrors++;
    if(pollErrors > 3){
      statusEl.textContent = '●';
      statusEl.style.color = '#ef4444';
    }
  }

  setInterval(poll, 300);
  poll();

  // ── Tap to copy ──────────────────────────────────────────
  // Uses textarea + execCommand for iOS Safari HTTP compatibility.
  // navigator.clipboard.writeText requires secure context (HTTPS).
  function copyToClipboard(text){
    // Try modern API first (works on HTTPS / localhost)
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(text).then(function(){return true})
        .catch(function(){return fallbackCopy(text)});
    }
    return Promise.resolve(fallbackCopy(text));
  }

  function fallbackCopy(text){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly','');
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);

    // iOS-specific selection
    ta.contentEditable = true;
    ta.readOnly = false;
    var range = document.createRange();
    range.selectNodeContents(ta);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    ta.setSelectionRange(0, text.length);

    var ok = false;
    try{ ok = document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    return ok;
  }

  function notifyServer(){
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/tapped', true);
    xhr.send();
  }

  function flash(){
    feedbackEl.className = 'show';
    setTimeout(function(){ feedbackEl.className = ''; }, 300);
  }

  // Use touchend for physical stylus (fires on capacitive touch lift)
  document.body.addEventListener('touchend', function(e){
    e.preventDefault();
    if(!currentText) return;
    copyToClipboard(currentText).then(function(ok){
      if(ok !== false){ flash(); notifyServer(); }
    });
  }, {passive: false});

  // Fallback for desktop testing (mouse click)
  document.body.addEventListener('click', function(){
    if(!currentText) return;
    copyToClipboard(currentText).then(function(ok){
      if(ok !== false){ flash(); notifyServer(); }
    });
  });

  // ── Send device info on load ─────────────────────────────
  function sendDeviceInfo(){
    var info = {
      screen_width: Math.round(screen.width * devicePixelRatio),
      screen_height: Math.round(screen.height * devicePixelRatio),
      css_width: screen.width,
      css_height: screen.height,
      pixel_ratio: devicePixelRatio,
      viewport_width: window.innerWidth,
      viewport_height: window.innerHeight,
      user_agent: navigator.userAgent
    };
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/device-info', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(info));
  }
  sendDeviceInfo();
})();
</script>
</body>
</html>
