<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>PhysiClaw</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  -webkit-touch-callout:none;
  -webkit-user-select:none;
  user-select:none;
}
body{position:relative}

/* ── Calibration mode ─────────────────────────────── */
body.mode-calibrate{background:#fff;touch-action:none}
body.mode-calibrate #bridge-layer{display:none}
body.mode-calibrate #calib-layer{display:block}

/* ── Bridge mode ──────────────────────────────────── */
body.mode-bridge{
  background:#e5e5e5;color:#333;
  font-family:-apple-system,system-ui,"Helvetica Neue",sans-serif;
  touch-action:manipulation;
}
body.mode-bridge #calib-layer{display:none}
body.mode-bridge #bridge-layer{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:fixed;top:0;left:0;right:0;bottom:0;
  padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);
}

/* ── Calibration elements ─────────────────────────── */
#calib-layer{position:fixed;top:0;left:0;width:100%;height:100%}
#phase-label{
  position:fixed;
  top:env(safe-area-inset-top,4px);
  right:4px;
  font:10px monospace;color:#ccc;z-index:1;
}

/* ── Bridge elements ──────────────────────────────── */
#msg-text{
  font-size:min(14vw,100px);
  font-weight:600;
  text-align:center;
  word-break:break-all;
  line-height:1.4;
  padding:20px;
  max-width:100%;
  transition:opacity 0.15s;
}
#msg-text.waiting{opacity:0.15;font-size:min(6vw,40px);font-weight:400}
#msg-status{
  position:fixed;
  top:calc(env(safe-area-inset-top,10px) + 6px);
  right:10px;
  font-size:11px;opacity:0.8;
  padding:4px 8px;
}
#msg-conn-label{color:#999;}
#center-circle{
  position:fixed;
  width:40px;height:40px;
  border-radius:50%;
  border:3px solid #4ade80;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
  z-index:10;
}
#center-circle.show{opacity:1;}
#msg-feedback{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(34,197,94,0.15);
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  z-index:20;
}
#msg-feedback.show{opacity:1}
#msg-hint{
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,20px) + 16px);
  font-size:13px;opacity:0.25;
  letter-spacing:0.5px;
}
</style>
</head>
<body class="mode-bridge">

<!-- Calibration layer -->
<div id="calib-layer">
  <div id="phase-label">idle</div>
  <svg id="canvas" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<!-- Bridge layer -->
<div id="bridge-layer">
  <div id="msg-status">● <span id="msg-conn-label">connecting…</span></div>
  <div id="msg-feedback"></div>
  <div id="msg-text" class="waiting">PhysiClaw</div>
  <div id="msg-hint">tap anywhere to copy</div>
  <div id="center-circle"></div>
</div>

<script>
(function(){
  // ════════════════════════════════════════════════════════
  // DOM REFS
  // ════════════════════════════════════════════════════════
  var svg = document.getElementById('canvas');
  var phaseLabel = document.getElementById('phase-label');
  var msgTextEl = document.getElementById('msg-text');
  var msgStatusEl = document.getElementById('msg-status');
  var msgFeedbackEl = document.getElementById('msg-feedback');
  var msgHintEl = document.getElementById('msg-hint');
  var centerCircleEl = document.getElementById('center-circle');

  // ════════════════════════════════════════════════════════
  // VIEWPORT SIZE — used for SVG viewBox and calibration rendering only
  // ════════════════════════════════════════════════════════
  var W = window.innerWidth;
  var H = window.innerHeight;

  function updateSize(){
    W = window.innerWidth;
    H = window.innerHeight;
    svg.setAttribute('viewBox', '0 0 '+W+' '+H);
  }
  updateSize();
  window.addEventListener('resize', updateSize);

  // ════════════════════════════════════════════════════════
  // SVG HELPERS — draw calibration targets (dots, markers, labels) into #canvas
  // ════════════════════════════════════════════════════════
  function clearSvg(){ svg.innerHTML = ''; }

  function circle(cx, cy, r, fill){
    var el = document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx', cx); el.setAttribute('cy', cy);
    el.setAttribute('r', r); el.setAttribute('fill', fill);
    svg.appendChild(el);
  }

  function rect(x, y, w, h, fill, rx){
    var el = document.createElementNS('http://www.w3.org/2000/svg','rect');
    el.setAttribute('x', x); el.setAttribute('y', y);
    el.setAttribute('width', w); el.setAttribute('height', h);
    el.setAttribute('fill', fill);
    if(rx) el.setAttribute('rx', rx);
    svg.appendChild(el);
  }

  function text(x, y, str, size, fill){
    var el = document.createElementNS('http://www.w3.org/2000/svg','text');
    el.setAttribute('x', x); el.setAttribute('y', y);
    el.setAttribute('font-size', size); el.setAttribute('fill', fill);
    el.setAttribute('text-anchor', 'middle');
    el.setAttribute('dominant-baseline', 'middle');
    el.setAttribute('font-family', 'system-ui, sans-serif');
    el.setAttribute('font-weight', 'bold');
    el.textContent = str;
    svg.appendChild(el);
  }

  // Animated expanding rings at touch point — visual feedback during calibration
  function flashTouch(cx, cy){
    var rings = [
      {delay: 0,   dur: 700, maxR: 50,  sw: 6},
      {delay: 120, dur: 700, maxR: 90,  sw: 5},
      {delay: 240, dur: 700, maxR: 130, sw: 4}
    ];
    rings.forEach(function(cfg){
      setTimeout(function(){
        var el = document.createElementNS('http://www.w3.org/2000/svg','circle');
        el.setAttribute('cx', cx); el.setAttribute('cy', cy);
        el.setAttribute('r', 8);
        el.setAttribute('fill', 'none');
        el.setAttribute('stroke', '#f97316');
        el.setAttribute('stroke-width', cfg.sw);
        el.setAttribute('opacity', '1');
        svg.appendChild(el);
        var start = performance.now();
        function animate(now){
          var t = Math.min((now - start) / cfg.dur, 1);
          var ease = 1 - (1 - t) * (1 - t);
          el.setAttribute('r', 8 + (cfg.maxR - 8) * ease);
          el.setAttribute('opacity', String(1 - ease));
          el.setAttribute('stroke-width', String(cfg.sw * (1 - ease * 0.5)));
          if(t < 1) requestAnimationFrame(animate);
          else if(el.parentNode) el.parentNode.removeChild(el);
        }
        requestAnimationFrame(animate);
      }, cfg.delay);
    });
    var dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy);
    dot.setAttribute('r', 12); dot.setAttribute('fill', '#f97316');
    dot.setAttribute('opacity', '1');
    svg.appendChild(dot);
    setTimeout(function(){ if(dot.parentNode) dot.parentNode.removeChild(dot); }, 800);
  }

  // ════════════════════════════════════════════════════════
  // RENDER FROM SERVER STATE (no local state)
  // ════════════════════════════════════════════════════════
  function renderCalibrate(data){
    clearSvg();
    var phase = data.phase || 'idle';
    var r = Math.min(W, H) * 0.08;
    switch(phase){
      case 'idle':
        text(W/2, H/2, 'PhysiClaw', 24, '#ddd');
        text(W/2, H/2+30, 'Waiting for calibration...', 14, '#ccc');
        break;
      case 'center':
        var cx = data.screen_center ? data.screen_center[0] : W*0.5;
        var cy = data.screen_center ? data.screen_center[1] : H*0.5;
        circle(cx, cy, r, '#f97316');
        break;
      case 'markers':
        var mSize = Math.min(W, H) * 0.12;
        rect(W*0.5-mSize*1.2, H*0.12-mSize*0.6, mSize*2.4, mSize*1.2, '#2563eb', 8);
        text(W*0.5, H*0.12, 'UP', mSize, '#ffffff');
        rect(W*0.82-mSize*1.8, H*0.5-mSize*0.6, mSize*3.6, mSize*1.2, '#ef4444', 8);
        text(W*0.82, H*0.5, 'RIGHT', mSize*0.8, '#ffffff');
        break;
      case 'grid':
        var cols = data.grid_cols || [0.25, 0.50, 0.75];
        var rows = data.grid_rows || [0.20, 0.40, 0.50, 0.60, 0.80];
        var dotR = Math.min(W, H) * 0.015;
        for(var ri=0; ri<rows.length; ri++)
          for(var ci=0; ci<cols.length; ci++)
            circle(W*cols[ci], H*rows[ri], dotR, '#ef4444');
        break;
      case 'dot':
        var dx = (data.dot_x || 0.5) * W;
        var dy = (data.dot_y || 0.5) * H;
        circle(dx, dy, r*0.6, '#f97316');
        break;
    }
    phaseLabel.textContent = phase;
  }

  function renderBridge(data){
    if(data.text !== null){
      msgTextEl.textContent = data.text;
      msgTextEl.className = '';
      msgHintEl.style.opacity = '0.4';
    } else {
      msgTextEl.textContent = 'PhysiClaw';
      msgTextEl.className = 'waiting';
      msgHintEl.style.opacity = '0.25';
    }
  }

  // ════════════════════════════════════════════════════════
  // CLIPBOARD (iOS Safari compatible)
  // ════════════════════════════════════════════════════════
  function copyToClipboard(txt){
    if(navigator.clipboard && navigator.clipboard.writeText){
      return navigator.clipboard.writeText(txt).then(function(){return true})
        .catch(function(){return fallbackCopy(txt)});
    }
    return Promise.resolve(fallbackCopy(txt));
  }

  function fallbackCopy(txt){
    var ta = document.createElement('textarea');
    ta.value = txt;
    ta.setAttribute('readonly','');
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.contentEditable = true;
    ta.readOnly = false;
    var range = document.createRange();
    range.selectNodeContents(ta);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    ta.setSelectionRange(0, txt.length);
    var ok = false;
    try{ ok = document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    return ok;
  }

  function bridgeFlash(){
    msgFeedbackEl.className = 'show';
    setTimeout(function(){ msgFeedbackEl.className = ''; }, 300);
  }

  function notifyBridgeTap(){
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/tapped', true);
    xhr.send();
  }

  // ════════════════════════════════════════════════════════
  // STATE — mirrors server's PhoneState.get_state() response
  // ════════════════════════════════════════════════════════
  // Updated every 250ms from GET /api/bridge/state. Touch handlers read this.
  // Bridge mode:    {mode, text}
  // Calibrate mode: {mode, phase, dot_x?, dot_y?, grid_cols, grid_rows, screen_center, screen_dimension}
  var state = {
    mode: 'bridge',
    text: null,
    phase: 'idle',
    grid_cols: [0.25, 0.50, 0.75],
    grid_rows: [0.20, 0.40, 0.50, 0.60, 0.80],
    screen_center: null,
    screen_dimension: null
  };

  // ════════════════════════════════════════════════════════
  // TOUCH HANDLING
  // ════════════════════════════════════════════════════════
  function sendScreenCenter(t){
    var offsetX = t.screenX - t.clientX;
    var offsetY = t.screenY - t.clientY;
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/screen-center', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify({
      x: Math.round(screen.width / 2 - offsetX),
      y: Math.round(screen.height / 2 - offsetY)
    }));
  }

  function sendTouch(payload){
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/touch', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify(payload));
  }

  document.body.addEventListener('touchstart', function(e){
    e.preventDefault();
    var t = e.touches[0];

    if(state.mode === 'calibrate'){
      if(state.phase === 'idle'){
        sendScreenCenter(t);
        flashTouch(t.clientX, t.clientY);
        return;
      }
      sendTouch({
        x: t.screenX / screen.width, y: t.screenY / screen.height
      });
      flashTouch(t.clientX, t.clientY);
    } else {
      if(state.text === null) return;
      copyToClipboard(state.text).then(function(ok){
        if(ok !== false){ bridgeFlash(); notifyBridgeTap(); }
      });
    }
  }, {passive:false});

  // ════════════════════════════════════════════════════════
  // POLL LOOP — single source of truth from server
  // ════════════════════════════════════════════════════════
  var pollErrors = 0;

  function poll(){
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/bridge/state', true);
    xhr.timeout = 3000;
    xhr.onload = function(){
      if(xhr.status === 200){
        pollErrors = 0;
        msgStatusEl.innerHTML = '● <span id="msg-conn-label">connected</span>';
        msgStatusEl.style.color = '#4ade80';

        var data = JSON.parse(xhr.responseText);
        Object.assign(state, data);

        // Always set mode from server
        document.body.className = 'mode-' + data.mode;

        if(data.mode === 'calibrate'){
          renderCalibrate(data);
        } else {
          renderBridge(data);
        }
      } else {
        onPollError();
      }
    };
    xhr.onerror = onPollError;
    xhr.ontimeout = onPollError;
    xhr.send();
  }

  function onPollError(){
    pollErrors++;
    if(pollErrors > 3){
      msgStatusEl.innerHTML = '● <span id="msg-conn-label">disconnected</span>';
      msgStatusEl.style.color = '#ef4444';
    }
  }

  setInterval(poll, 250);
  poll();

  // ════════════════════════════════════════════════════════
  // DEVICE INFO (sent once on load)
  // ════════════════════════════════════════════════════════
  (function(){
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/bridge/screen-dimension', true);
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.send(JSON.stringify({
      screen_width: screen.width,
      screen_height: screen.height
    }));
  })();
})();
</script>
</body>
</html>
